<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObsiLock — DashBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1a1a1a;
            --sidebar: #232323;
            --card: #2a2a2a;
            --primary: #2ecc71;
            --text: #ffffff;
            --muted: #9499a1;
            --border: #383838;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 80px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-logo {
            margin-bottom: 30px;
        }

        .sidebar-logo img {
            width: 52px;
            height: auto;
        }

        .sidebar-logo .brand {
            font-size: .7rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-top: 4px;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.3rem;
            transition: background .15s, color .15s;
        }

        .nav-icon:hover,
        .nav-icon.active {
            background: rgba(46, 204, 113, .12);
            color: var(--primary);
        }

        .nav-icon.active {
            border-left: 3px solid var(--primary);
            border-radius: 0 10px 10px 0;
        }

        .sidebar-bottom {
            margin-top: auto;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOP BAR */
        .topbar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .breadcrumb {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: .8rem;
            color: var(--muted);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            flex: 1;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            min-width: 260px;
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: var(--muted);
        }

        .search-icon {
            color: var(--muted);
            font-size: 1rem;
        }

        /* CONTENT */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* CARD */
        .c-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .c-card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .c-card-sub {
            font-size: .8rem;
            color: var(--muted);
            margin-top: 2px;
            margin-bottom: 16px;
        }

        /* Items row (folders/files) */
        .items-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .thumb-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 70px;
        }

        .thumb-icon {
            font-size: 2.2rem;
            color: var(--primary);
            line-height: 1;
        }

        .thumb-name {
            font-size: .72rem;
            color: var(--muted);
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .thumb-size {
            font-size: .65rem;
            color: var(--muted);
        }

        .btn-add {
            display: block;
            width: 100%;
            margin-top: 14px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .btn-add:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Activity */
        .activity-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .activity-row:last-child {
            border-bottom: none;
        }

        .activity-icon {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .activity-label {
            flex: 1;
            font-size: .88rem;
        }

        .activity-time {
            font-size: .78rem;
            color: var(--muted);
        }

        /* QUOTA bar */
        .quota-section {
            padding: 10px 24px 0;
            flex-shrink: 0;
        }

        .quota-bar-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .quota-label {
            font-size: .85rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .quota-track {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .quota-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
            transition: width .4s;
        }

        /* BOTTOM SEND */
        .bottom-section {
            padding: 16px 24px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .bottom-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: underline;
            margin-bottom: 12px;
        }

        .send-btns {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn-send {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 28px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .btn-send:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Placeholder when empty */
        .empty {
            color: var(--muted);
            font-size: .85rem;
            padding: 10px 0;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="logo.png" alt="ObsiLock">
            <div class="brand">ObsiLock</div>
        </div>

        <div class="nav-icons">
            <div class="nav-icon active" title="Dossiers">📁</div>
            <div class="nav-icon" title="Fichiers">📄</div>
            <div class="nav-icon" title="Partages" id="nav-shares">🔗</div>
            <div class="nav-icon" title="Favoris">⭐</div>
            <div class="nav-icon" title="Corbeille">🗑️</div>
        </div>

        <div class="sidebar-bottom">
            <div class="nav-icon" title="Paramètres">⚙️</div>
            <div class="nav-icon" title="Déconnexion" id="btn-logout">🚪</div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <!-- TOP -->
        <div class="topbar">
            <span class="breadcrumb">Dashboard</span>
            <h1 class="page-title">DashBoard</h1>
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Rechercher">
            </div>
        </div>

        <!-- QUOTA -->
        <div class="quota-section">
            <div class="quota-bar-wrap">
                <span class="quota-label" id="quota-label">0go / 5go</span>
                <div class="quota-track">
                    <div class="quota-fill" id="quota-fill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content-scroll">
            <div class="grid">

                <!-- Dossiers -->
                <div class="c-card">
                    <div class="c-card-title">Dossier</div>
                    <div class="c-card-sub" id="folder-count">0 dossiers</div>
                    <div class="items-row" id="folder-list">
                        <span class="empty">Aucun dossier</span>
                    </div>
                    <button class="btn-add" id="btn-new-folder">Ajouter un nouveau dossier</button>
                </div>

                <!-- Fichiers -->
                <div class="c-card">
                    <div class="c-card-title">Fichier</div>
                    <div class="c-card-sub" id="file-count">0 fichiers</div>
                    <div class="items-row" id="file-list">
                        <span class="empty">Aucun fichier</span>
                    </div>
                    <button class="btn-add" id="btn-upload">Ajouter un nouveau fichier</button>
                    <input type="file" id="file-input" style="display:none">
                </div>

                <!-- Activité -->
                <div class="c-card">
                    <div class="c-card-title">Activité récente</div>
                    <div style="margin-top:12px;" id="activity-list">
                        <div class="empty">Chargement...</div>
                    </div>
                </div>

                <!-- Partages -->
                <div class="c-card">
                    <div class="c-card-title">Consulter mes envoie <span style="color:var(--primary)">🔗</span></div>
                    <div class="items-row" id="shares-list" style="margin-top:12px;">
                        <div class="empty">Aucun partage</div>
                    </div>
                    <button class="btn-add" id="btn-shares">Consulter</button>
                </div>

            </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom-section">
            <h3>Envoyer un dossier/fichier</h3>
            <div class="send-btns">
                <button class="btn-send">Envoyer un dossier</button>
                <button class="btn-send" id="btn-upload2">Envoyer un fichier</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = 'https://api.obsilock.iris.a3n.fr:4433';
        const token = localStorage.getItem('obsilock_token');
        const email = localStorage.getItem('obsilock_email') || '';

        if (!token) { window.location.href = 'login.html'; }

        const authH = { 'Authorization': 'Bearer ' + token };

        function formatSize(b) {
            if (!b) return '0o';
            if (b < 1024) return b + 'o';
            if (b < 1024 ** 2) return (b / 1024).toFixed(0) + 'ko';
            if (b < 1024 ** 3) return (b / 1024 ** 2).toFixed(1) + 'mo';
            return (b / 1024 ** 3).toFixed(1) + 'go';
        }

        function folderIcon() { return '📁'; }
        function fileIcon(name) {
            if (!name) return '📄';
            const ext = name.split('.').pop().toLowerCase();
            const m = { pdf: '📑', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', mp4: '🎬', mp3: '🎵', zip: '🗜️' };
            return m[ext] || '📄';
        }

        // Quota
        async function loadQuota() {
            try {
                const r = await fetch(`${BASE}/me/quota`, { headers: authH });
                const d = await r.json();
                const used = d.used || d.quota_used || 0;
                const total = d.total || d.quota_total || (5 * 1024 ** 3);
                const pct = Math.min(100, (used / total) * 100).toFixed(1);
                document.getElementById('quota-label').textContent = `${formatSize(used)} / ${formatSize(total)}`;
                document.getElementById('quota-fill').style.width = pct + '%';
            } catch { }
        }

        // Folders
        async function loadFolders() {
            try {
                const r = await fetch(`${BASE}/folders`, { headers: authH });
                const d = await r.json();
                const folders = Array.isArray(d) ? d : (d.data || d.folders || []);
                document.getElementById('folder-count').textContent = `${folders.length} dossier(s)`;
                const list = document.getElementById('folder-list');
                if (folders.length === 0) { list.innerHTML = '<span class="empty">Aucun dossier</span>'; return; }
                list.innerHTML = folders.slice(0, 6).map(f => `
            <div class="thumb-item">
                <div class="thumb-icon">${folderIcon()}</div>
                <div class="thumb-name">${f.name || 'Dossier'}</div>
                <div class="thumb-size">—</div>
            </div>
        `).join('');
            } catch { }
        }

        // Files
        async function loadFiles() {
            try {
                const r = await fetch(`${BASE}/files?page=1&per_page=8`, { headers: authH });
                const d = await r.json();
                const files = d.data || d.files || [];
                const total = d.pagination?.total || files.length;
                document.getElementById('file-count').textContent = `${total} fichier(s)`;
                const list = document.getElementById('file-list');
                if (files.length === 0) { list.innerHTML = '<span class="empty">Aucun fichier</span>'; return; }
                list.innerHTML = files.slice(0, 6).map(f => `
            <div class="thumb-item">
                <div class="thumb-icon">${fileIcon(f.filename || f.name)}</div>
                <div class="thumb-name">${f.filename || f.name || 'Fichier'}</div>
                <div class="thumb-size">${formatSize(f.size)}</div>
            </div>
        `).join('');
            } catch { }
        }

        // Activity
        async function loadActivity() {
            try {
                const r = await fetch(`${BASE}/me/activity?limit=3`, { headers: authH });
                const d = await r.json();
                const acts = d.activities || d.data || d || [];
                const list = document.getElementById('activity-list');
                if (!acts.length) { list.innerHTML = '<div class="empty">Aucune activité</div>'; return; }
                list.innerHTML = acts.slice(0, 3).map(a => {
                    const isFolder = (a.type || '').includes('folder');
                    const icon = a.type === 'download' ? '⬇️' : a.type === 'delete' ? '🗑' : isFolder ? '📁' : '📄';
                    const label = a.filename || a.folder_name || a.name || a.type || '—';
                    const time = a.date ? new Date(a.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
                    return `<div class="activity-row">
                <span class="activity-icon">${icon}</span>
                <span class="activity-label">${label}</span>
                <span class="activity-time">${time}</span>
            </div>`;
                }).join('');
            } catch {
                document.getElementById('activity-list').innerHTML = '<div class="empty">Activité non disponible</div>';
            }
        }

        // Upload
        document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('btn-upload2').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            try {
                const r = await fetch(`${BASE}/files`, { method: 'POST', headers: authH, body: fd });
                if (r.ok) { alert('Fichier uploadé !'); loadFiles(); loadQuota(); }
                else { const d = await r.json(); alert('Erreur : ' + (d.error || r.status)); }
            } catch { alert('Erreur réseau'); }
            e.target.value = '';
        });

        // New folder
        document.getElementById('btn-new-folder').addEventListener('click', async () => {
            const name = prompt('Nom du nouveau dossier :');
            if (!name) return;
            try {
                const r = await fetch(`${BASE}/folders`, {
                    method: 'POST', headers: { ...authH, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (r.ok) { loadFolders(); }
                else { const d = await r.json(); alert('Erreur : ' + (d.error || r.status)); }
            } catch { alert('Erreur réseau'); }
        });

        // Logout
        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('obsilock_token');
            localStorage.removeItem('obsilock_email');
            window.location.href = 'login.html';
        });

        // Init
        loadQuota(); loadFolders(); loadFiles(); loadActivity();
    </script>
</body>

</html>
