<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObsiLock — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1a1a1a;
            --card-bg: #232323;
            --primary: #2ecc71;
            --text: #ffffff;
            --muted: #9499a1;
            --border: #333333;
            --input-bg: #2c2c2c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 48px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: up .4s ease;
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-wrap img {
            width: 90px;
            height: auto;
            margin-bottom: 10px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: .5px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 32px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color .2s;
        }

        input::placeholder {
            color: var(--muted);
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: transform .15s, box-shadow .15s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, .35);
        }

        .links {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .links a {
            color: var(--muted);
            font-size: 0.88rem;
            text-decoration: none;
            transition: color .15s;
        }

        .links a:hover {
            color: var(--primary);
        }

        .error-msg {
            background: rgba(255, 71, 87, .1);
            border: 1px solid rgba(255, 71, 87, .3);
            color: #ff4757;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: .85rem;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="logo.png" alt="ObsiLock">
            <span class="brand">ObsiLock</span>
        </div>

        <h2>Connexion à votre<br>espace sécurisé</h2>

        <div class="error-msg" id="err"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Mot de Passe" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit" id="btn-submit">Se Connecter</button>
        </form>

        <div class="links">
            <a href="#">Mot de passe oublié ?</a>
            <a href="#" id="go-register">Créer un compte</a>
        </div>
    </div>

    <script>
        const BASE = 'http://api.obsilock.iris.a3n.fr:8080';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('err');
            const btn = document.getElementById('btn-submit');
            err.style.display = 'none';
            btn.textContent = 'Connexion...';
            btn.disabled = true;

            try {
                const res = await fetch(`${BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    err.textContent = data.error || data.message || 'Identifiants invalides';
                    err.style.display = 'block';
                    btn.textContent = 'Se Connecter';
                    btn.disabled = false;
                    return;
                }
                const token = data.token || data.jwt;
                localStorage.setItem('obsilock_token', token);
                localStorage.setItem('obsilock_email', document.getElementById('email').value);
                window.location.href = 'index.html';
            } catch (e) {
                err.textContent = 'Erreur réseau — Serveur inaccessible';
                err.style.display = 'block';
                btn.textContent = 'Se Connecter';
                btn.disabled = false;
            }
        });

        document.getElementById('go-register').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Inscription à venir !');
        });

        // Si déjà connecté, rediriger
        if (localStorage.getItem('obsilock_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
